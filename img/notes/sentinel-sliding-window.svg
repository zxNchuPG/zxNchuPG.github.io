<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#5b6b88"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2d3d; }
      .label { font: 700 16px Arial, sans-serif; fill: #243447; }
      .text { font: 14px Arial, sans-serif; fill: #425466; }
      .old { fill: #f7f7f7; stroke: #c6ced9; stroke-width: 2; }
      .bucket { fill: #eef5ff; stroke: #5f8dd3; stroke-width: 2; }
      .active { fill: #d9f2df; stroke: #63a46c; stroke-width: 2; }
      .note { fill: #fff8ea; stroke: #d8b15e; stroke-width: 2; rx: 12; ry: 12; }
      .line { stroke: #5b6b88; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="470" fill="#ffffff"/>
  <text x="48" y="45" class="title">滑动窗口如何支撑 Sentinel 的实时统计</text>
  <text x="55" y="92" class="label">示例：1 秒窗口切成 5 个 bucket，每个 bucket 200ms</text>

  <rect x="70" y="140" width="180" height="88" class="old"/>
  <rect x="250" y="140" width="180" height="88" class="bucket"/>
  <rect x="430" y="140" width="180" height="88" class="bucket"/>
  <rect x="610" y="140" width="180" height="88" class="active"/>
  <rect x="790" y="140" width="180" height="88" class="bucket"/>

  <text x="116" y="176" class="label">旧 bucket</text>
  <text x="110" y="202" class="text">已过期，后续可 reset 复用</text>

  <text x="315" y="176" class="label">bucket-1</text>
  <text x="305" y="202" class="text">记录 pass / block / rt</text>

  <text x="495" y="176" class="label">bucket-2</text>
  <text x="485" y="202" class="text">记录 pass / block / rt</text>

  <text x="663" y="176" class="label">当前 bucket</text>
  <text x="666" y="202" class="text">新请求落到这里</text>

  <text x="856" y="176" class="label">bucket-4</text>
  <text x="848" y="202" class="text">未来时间片位置</text>

  <path d="M700 228 V278" class="line"/>

  <rect x="505" y="286" width="420" height="108" class="note"/>
  <text x="530" y="320" class="label">currentWindow(timeMillis) 的核心动作</text>
  <text x="530" y="346" class="text">1. 先按当前时间算出数组索引和窗口起点。</text>
  <text x="530" y="368" class="text">2. 桶为空就创建，桶有效就复用，桶过期就 reset 为新的时间片。</text>

  <rect x="60" y="286" width="390" height="108" class="note"/>
  <text x="84" y="320" class="label">为什么不是固定窗口</text>
  <text x="84" y="346" class="text">固定窗口在边界附近容易放大瞬时流量，统计抖动明显。</text>
  <text x="84" y="368" class="text">滑动窗口始终统计“最近一段连续时间”的有效 bucket。</text>
</svg>
