<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#5b6b88"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2d3d; }
      .sub { font: 700 19px Arial, sans-serif; fill: #243447; }
      .label { font: 700 16px Arial, sans-serif; fill: #243447; }
      .text { font: 14px Arial, sans-serif; fill: #425466; }
      .a { fill: #eef5ff; stroke: #5f8dd3; stroke-width: 2; rx: 12; ry: 12; }
      .b { fill: #f7fbf3; stroke: #72a44a; stroke-width: 2; rx: 12; ry: 12; }
      .line { stroke: #5b6b88; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="48" y="45" class="title">Gateway 与 Feign 适配器如何接入 Sentinel</text>

  <text x="80" y="95" class="sub">Feign 适配器</text>
  <rect x="55" y="120" width="190" height="90" class="a"/>
  <text x="96" y="156" class="label">SentinelFeign.Builder</text>
  <text x="89" y="184" class="text">替换默认 Feign 构建过程</text>

  <rect x="280" y="120" width="190" height="90" class="a"/>
  <text x="317" y="156" class="label">SentinelInvocationHandler</text>
  <text x="318" y="184" class="text">包装每次远程调用</text>

  <rect x="505" y="120" width="165" height="90" class="b"/>
  <text x="555" y="156" class="label">ContextUtil</text>
  <text x="551" y="184" class="text">enter(resource)</text>

  <rect x="705" y="120" width="150" height="90" class="b"/>
  <text x="747" y="156" class="label">SphU.entry</text>
  <text x="739" y="184" class="text">EntryType.OUT</text>

  <rect x="890" y="120" width="230" height="90" class="a"/>
  <text x="947" y="156" class="label">fallback / Tracer</text>
  <text x="915" y="184" class="text">异常时 trace，再决定是否降级</text>

  <path d="M245 165 H280" class="line"/>
  <path d="M470 165 H505" class="line"/>
  <path d="M670 165 H705" class="line"/>
  <path d="M855 165 H890" class="line"/>

  <text x="80" y="285" class="sub">Gateway 适配器</text>
  <rect x="55" y="310" width="195" height="92" class="a"/>
  <text x="96" y="346" class="label">SentinelGatewayFilter</text>
  <text x="89" y="374" class="text">拿到 routeId / API 名称</text>

  <rect x="285" y="310" width="180" height="92" class="a"/>
  <text x="322" y="346" class="label">GatewayParamParser</text>
  <text x="315" y="374" class="text">解析热点参数</text>

  <rect x="500" y="310" width="195" height="92" class="b"/>
  <text x="531" y="346" class="label">GatewayCallbackManager</text>
  <text x="536" y="374" class="text">来源解析 / 阻塞处理</text>

  <rect x="730" y="310" width="190" height="92" class="b"/>
  <text x="760" y="346" class="label">SentinelReactorTransformer</text>
  <text x="778" y="374" class="text">接入 Reactor 链</text>

  <rect x="955" y="310" width="160" height="92" class="a"/>
  <text x="994" y="346" class="label">Sentinel 规则</text>
  <text x="982" y="374" class="text">按路由 / API 生效</text>

  <path d="M250 356 H285" class="line"/>
  <path d="M465 356 H500" class="line"/>
  <path d="M695 356 H730" class="line"/>
  <path d="M920 356 H955" class="line"/>
</svg>
