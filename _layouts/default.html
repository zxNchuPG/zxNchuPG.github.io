<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<!-- hack iOS CSS :active style -->
<body ontouchstart="">

    {% include nav.html %}
    
    {{ content }}

    {% include footer.html %}


    <script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

const renderMermaidDiagrams = async () => {
    const codeBlocks = document.querySelectorAll(
        "pre code.language-mermaid, pre code[data-lang='mermaid'], div.language-mermaid pre code, div.language-mermaid code"
    );

    codeBlocks.forEach((codeBlock) => {
        if (codeBlock.dataset.mermaidProcessed === "true") {
            return;
        }

        const source = codeBlock.textContent.trim();

        if (!source) {
            return;
        }

        const container =
            codeBlock.closest("div.language-mermaid") ||
            codeBlock.closest("pre");

        if (!container) {
            return;
        }

        const diagram = document.createElement("div");
        diagram.className = "mermaid";
        diagram.textContent = source;

        codeBlock.dataset.mermaidProcessed = "true";
        container.replaceWith(diagram);
    });

    mermaid.initialize({
        startOnLoad: false,
        theme: "default"
    });

    await mermaid.run({
        querySelector: ".mermaid"
    });
};

if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => {
        renderMermaidDiagrams().catch((error) => {
            console.error("Failed to render Mermaid diagrams.", error);
        });
    });
} else {
    renderMermaidDiagrams().catch((error) => {
        console.error("Failed to render Mermaid diagrams.", error);
    });
}
</script>
    
<!-- Image to hack wechat -->
<img src="/img/icon_wechat.png" width="0" height="0" />
