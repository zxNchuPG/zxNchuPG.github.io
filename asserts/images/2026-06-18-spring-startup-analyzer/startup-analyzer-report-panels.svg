<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="640" y="58" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#0f172a">spring-startup-analyzer 报告面板示意图</text>

  <rect x="60" y="100" width="1160" height="600" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="90" y="130" width="1100" height="70" rx="16" fill="#e2e8f0"/>
  <text x="130" y="174" font-size="22" font-family="Arial, sans-serif" fill="#334155">Project: demo-app</text>
