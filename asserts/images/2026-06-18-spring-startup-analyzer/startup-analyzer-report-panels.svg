  <rect x="640" y="465" width="550" height="200" rx="18" fill="#fef2f2" stroke="#f87171" stroke-width="2.5"/>
  <text x="915" y="505" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#b91c1c">未加载 Jar 与优化建议</text>
  <text x="675" y="545" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">unused-lib-a.jar</text>
  <text x="1025" y="545" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">未在启动阶段使用</text>
  <text x="675" y="580" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">legacy-sdk.jar</text>
  <text x="1025" y="580" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">建议复查依赖</text>
  <text x="675" y="615" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">fat jar 过大</text>
  <text x="1025" y="615" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">检查扫描范围</text>

  <text x="640" y="730" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#334155">推荐阅读顺序：Bean 详情 -> 时序图 -> 方法统计 -> 火焰图 -> 依赖瘦身</text>
