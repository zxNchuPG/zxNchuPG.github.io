  <text x="500" y="410" font-size="16" font-family="Arial, sans-serif" fill="#5b21b6">关键路径越长，越值得优先优化</text>

  <rect x="830" y="230" width="360" height="200" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="1010" y="270" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#15803d">方法调用统计</text>
  <line x1="860" y1="295" x2="1160" y2="295" stroke="#86efac" stroke-width="2"/>
  <text x="870" y="326" font-size="18" font-family="Arial, sans-serif" fill="#166534">URLClassLoader.findResource</text>
  <text x="1100" y="326" font-size="18" font-family="Arial, sans-serif" fill="#166534">1432 次</text>
  <text x="870" y="360" font-size="18" font-family="Arial, sans-serif" fill="#166534">ConfigParser.parse</text>
  <text x="1100" y="360" font-size="18" font-family="Arial, sans-serif" fill="#166534">4.6s</text>
  <text x="870" y="394" font-size="18" font-family="Arial, sans-serif" fill="#166534">ClassPathScanner.scan</text>
  <text x="1100" y="394" font-size="18" font-family="Arial, sans-serif" fill="#166534">3.1s</text>

  <rect x="90" y="465" width="520" height="200" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2.5"/>
