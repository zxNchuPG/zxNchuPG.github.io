  <text x="250" y="270" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#1d4ed8">Bean 初始化详情</text>
  <line x1="115" y1="295" x2="385" y2="295" stroke="#93c5fd" stroke-width="2"/>
  <text x="120" y="325" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">cacheWarmupBean</text>
  <text x="340" y="325" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">18.2s</text>
  <text x="120" y="360" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">mqClientFactory</text>
  <text x="340" y="360" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">9.6s</text>
  <text x="120" y="395" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">ruleEngineBean</text>
  <text x="340" y="395" font-size="18" font-family="Arial, sans-serif" fill="#1e3a8a">7.4s</text>

  <rect x="440" y="230" width="360" height="200" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="620" y="270" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" fill="#6d28d9">Bean 初始化时序图</text>
  <line x1="470" y1="380" x2="770" y2="380" stroke="#c4b5fd" stroke-width="3"/>
  <rect x="490" y="315" width="95" height="28" rx="8" fill="#a78bfa"/>
