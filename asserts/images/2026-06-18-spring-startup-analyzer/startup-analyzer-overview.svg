  <text x="550" y="210" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#5b21b6">-javaagent 挂载</text>
  <text x="550" y="244" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#5b21b6">字节码增强</text>
  <text x="550" y="278" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#5b21b6">启动阶段采集</text>

  <rect x="780" y="90" width="420" height="270" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
