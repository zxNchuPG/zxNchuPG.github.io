  <text x="195" y="230" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#1e3a8a">Spring Boot / Spring</text>
  <text x="195" y="262" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#1e3a8a">正常业务启动</text>

  <rect x="400" y="120" width="300" height="210" rx="20" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
