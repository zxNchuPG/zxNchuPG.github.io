  <text x="995" y="552" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#075985">前后对比</text>
  <text x="995" y="584" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#075985">确认收益</text>

  <line x1="320" y1="220" x2="400" y2="220" stroke="#64748b" stroke-width="4"/>
  <polygon points="400,220 384,212 384,228" fill="#64748b"/>
  <line x1="700" y1="220" x2="780" y2="220" stroke="#64748b" stroke-width="4"/>
  <polygon points="780,220 764,212 764,228" fill="#64748b"/>

  <line x1="990" y1="360" x2="990" y2="405" stroke="#64748b" stroke-width="4"/>
  <polygon points="990,405 982,389 998,389" fill="#64748b"/>
  <line x1="870" y1="515" x2="800" y2="515" stroke="#64748b" stroke-width="4"/>
  <polygon points="800,515 816,507 816,523" fill="#64748b"/>
  <line x1="540" y1="515" x2="460" y2="515" stroke="#64748b" stroke-width="4"/>
  <polygon points="460,515 476,507 476,523" fill="#64748b"/>

  <text x="640" y="670" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#334155">采集不是终点，真正的价值在于形成“定位 - 优化 - 验证”的启动优化闭环</text>
