<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="64" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#0f172a">spring-startup-analyzer 总体工作流</text>
