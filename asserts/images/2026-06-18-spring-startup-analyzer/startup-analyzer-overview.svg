  <rect x="830" y="170" width="150" height="56" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="905" y="205" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#166534">Bean 详情</text>
  <rect x="1000" y="170" width="150" height="56" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="1075" y="205" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#166534">时间轴</text>
  <rect x="830" y="250" width="150" height="56" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="905" y="285" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#166534">方法统计</text>
  <rect x="1000" y="250" width="150" height="56" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="1075" y="285" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#166534">火焰图</text>

  <rect x="180" y="430" width="280" height="170" rx="20" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
  <text x="320" y="478" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#9a3412">定位热点</text>
  <text x="320" y="520" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#9a3412">最慢 Bean</text>
  <text x="320" y="552" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#9a3412">关键路径</text>
  <text x="320" y="584" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#9a3412">线程热点</text>

  <rect x="540" y="430" width="260" height="170" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="670" y="478" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#991b1b">优化动作</text>
  <text x="670" y="520" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">改代码</text>
  <text x="670" y="552" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">删依赖</text>
  <text x="670" y="584" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#991b1b">异步 Bean</text>

